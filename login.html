<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dang nhap | CubeAL</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="./css/auth.css">
</head>
<body class="auth-page">
    <div class="auth-shell">
        <header class="auth-top">
            <a class="auth-brand" href="./index.html">
                <span class="auth-brand__icon"><i class="fa-solid fa-cube"></i></span>
                <span class="auth-brand__text">
                    <strong>CubeAL</strong>
                </span>
            </a>
        </header>

        <main class="auth-main">
            <section class="auth-card">
                <div class="auth-card__head">
                    <h2>ĐĂNG NHẬP</h2>
                </div>

                <form id="login-form" class="auth-form" novalidate>
                    <label class="auth-field">
                        <span>Email</span>
                        <input type="email" name="email" placeholder="email@cubeal.com" required>
                    </label>

                    <label class="auth-field">
                        <span>Mật khẩu</span>
                        <input type="password" name="password" placeholder="Nhap mat khau" required>
                    </label>

                    <div class="auth-meta">
                        <label class="auth-check">
                            <input type="checkbox" name="remember"> Ghi nhớ
                        </label>
                        <a class="auth-inline" href="./register.html">Chưa có tài khoản?</a>
                    </div>

                    <p class="auth-msg" data-auth-message hidden></p>
                    <button class="auth-submit" type="submit">Đăng nhập</button>
                </form>
            </section>
        </main>
    </div>
    <script src="./js/auth.js"></script>
</body>
</html>
